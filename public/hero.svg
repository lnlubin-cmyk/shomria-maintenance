<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="איור של מבני הקיבוץ">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe9f7"/>
      <stop offset="100%" stop-color="#eef7f2"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fbf7f"/>
      <stop offset="100%" stop-color="#5f9a52"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <circle cx="672" cy="86" r="34" fill="#ffd772"/>

  <!-- hills -->
  <path d="M0 330 Q 140 268 290 320 T 560 306 T 800 330 L800 450 L0 450 Z" fill="#a8cf98"/>
  <path d="M0 366 Q 190 322 400 358 T 800 350 L800 450 L0 450 Z" fill="url(#ground)"/>

  <!-- water tower -->
  <g>
    <rect x="96" y="228" width="8" height="112" fill="#9aa5a0"/>
    <rect x="124" y="228" width="8" height="112" fill="#9aa5a0"/>
    <rect x="92" y="272" width="44" height="6" fill="#9aa5a0"/>
    <ellipse cx="114" cy="228" rx="34" ry="12" fill="#d7dedb"/>
    <rect x="80" y="196" width="68" height="34" rx="4" fill="#eaf0ed"/>
    <ellipse cx="114" cy="196" rx="34" ry="12" fill="#f7faf9"/>
  </g>

  <!-- house 1 -->
  <g>
    <rect x="188" y="266" width="128" height="82" rx="3" fill="#fdfaf4"/>
    <path d="M178 268 L252 216 L326 268 Z" fill="#c96a4e"/>
    <rect x="206" y="290" width="28" height="28" rx="2" fill="#bcdcef"/>
    <rect x="270" y="290" width="28" height="28" rx="2" fill="#bcdcef"/>
    <rect x="240" y="308" width="26" height="40" rx="2" fill="#8a6b4f"/>
  </g>

  <!-- house 2 (larger, center) -->
  <g>
    <rect x="344" y="242" width="164" height="106" rx="3" fill="#ffffff"/>
    <path d="M332 244 L426 182 L520 244 Z" fill="#2f7d5d"/>
    <rect x="366" y="268" width="32" height="32" rx="2" fill="#bcdcef"/>
    <rect x="454" y="268" width="32" height="32" rx="2" fill="#bcdcef"/>
    <rect x="410" y="296" width="32" height="52" rx="2" fill="#8a6b4f"/>
    <circle cx="435" cy="322" r="2.5" fill="#e8c86a"/>
  </g>

  <!-- house 3 -->
  <g>
    <rect x="536" y="272" width="118" height="76" rx="3" fill="#fdfaf4"/>
    <path d="M526 274 L595 226 L664 274 Z" fill="#c96a4e"/>
    <rect x="552" y="294" width="26" height="26" rx="2" fill="#bcdcef"/>
    <rect x="612" y="294" width="26" height="26" rx="2" fill="#bcdcef"/>
    <rect x="584" y="312" width="24" height="36" rx="2" fill="#8a6b4f"/>
  </g>

  <!-- trees -->
  <g fill="#3f7f4a">
    <circle cx="150" cy="330" r="24"/><rect x="146" y="330" width="8" height="26" fill="#7a5a3c"/>
    <circle cx="700" cy="318" r="28"/><rect x="695" y="318" width="9" height="30" fill="#7a5a3c"/>
    <circle cx="756" cy="336" r="20"/><rect x="752" y="336" width="7" height="22" fill="#7a5a3c"/>
  </g>

  <!-- path -->
  <path d="M400 450 Q 410 400 380 372 Q 350 348 400 340" stroke="#e6dcc4" stroke-width="26" fill="none" stroke-linecap="round"/>
</svg>
